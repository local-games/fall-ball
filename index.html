<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIRBY DOWN! Solid Control Edition</title>
    <style>
        body {
            background-color: #ffdeef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: manipulation;
        }
        .ui {
            color: #d14789;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 1px 1px white;
        }
        canvas {
            background-color: #fff;
            border: 5px solid #ff69b4;
            border-left: 12px solid #ff85c2; 
            border-right: 12px solid #ff85c2;
            border-radius: 5px;
            max-width: 95vw;
            max-height: 60vh;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
        }
        .controls {
            display: flex;
            width: 100%;
            max-width: 400px;
            justify-content: space-around;
            margin-top: 20px;
        }
        .btn {
            width: 80px;
            height: 80px;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-shadow: 0 4px #d14789;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            box-shadow: none;
            transform: translateY(4px);
        }
        #gameOverScreen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(80, 0, 60, 0.82);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
        }
        #gameOverScreen.show { display: flex; }
        .go-box {
            background: linear-gradient(160deg, #fff0f8, #ffd6f0);
            border: 4px solid #ff69b4;
            border-radius: 20px;
            padding: 24px 32px;
            width: 320px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(200,0,100,0.25);
            text-align: center;
        }
        .go-title {
            font-size: 32px;
            font-weight: bold;
            color: #d1006a;
            text-shadow: 2px 2px #ffb0d8;
            margin-bottom: 4px;
        }
        .go-score {
            font-size: 22px;
            color: #a0005a;
            margin-bottom: 16px;
        }
        .go-score span { font-size: 36px; font-weight: bold; color: #d1006a; }
        .ranking-title {
            font-size: 14px;
            font-weight: bold;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .ranking-list {
            list-style: none;
            padding: 0; margin: 0 0 20px;
        }
        .ranking-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            font-size: 16px;
            font-weight: bold;
        }
        .ranking-list li.rank-1 { background: #fff0a0; color: #a07000; }
        .ranking-list li.rank-2 { background: #e8e8f0; color: #606080; }
        .ranking-list li.rank-3 { background: #ffe8d8; color: #905030; }
        .ranking-list li.current { outline: 2px solid #ff69b4; }
        .rank-num { font-size: 20px; width: 28px; text-align: left; }
        .rank-score { font-size: 18px; }
        .go-btn {
            background: linear-gradient(135deg, #ff69b4, #d1006a);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 40px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px #a00050;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .go-btn:active { transform: translateY(3px); box-shadow: 0 1px #a00050; }
    </style>
</head>
<body>

    <div class="ui">階層: <span id="depth">0</span> m</div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <div class="controls">
        <button class="btn" id="leftBtn">←</button>
        <button class="btn" id="rightBtn">→</button>
    </div>

    <div id="gameOverScreen">
        <div class="go-box">
            <div class="go-title">GAME OVER</div>
            <div class="go-score">記録: <span id="goScore">0</span> m</div>
            <div class="ranking-title">🏆 RANKING</div>
            <ul class="ranking-list" id="rankingList"></ul>
            <button class="go-btn" onclick="location.reload()">もう一度！</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const depthElement = document.getElementById('depth');

        // --- パラメータ調整 ---
        const GRAVITY_MAX = 0.18;    // 終端重力（最大加速時）
        const GRAVITY_MIN = 0.01;    // 落ち始めの重力（浮遊感）
        const FLOAT_THRESHOLD = 1.2; // この速度までは浮遊感重力を適用
        const WALK_SPEED = 2;       // 横移動速度
        const FALL_AIR_RESISTANCE = 0.99; // 落下速度にのみ適用する抵抗
        const INITIAL_SCROLL_SPEED = 0.45; 
        const SPEED_UP_RATE = 0.0003; 
        const PLATFORM_WIDTH = 80;
        const PLATFORM_HEIGHT = 15;

        let scrollSpeed = INITIAL_SCROLL_SPEED;
        let player = {
            x: 185,
            y: 250, 
            width: 30,
            height: 30,
            vx: 0,
            vy: 0,
            color: '#ffafcc',
            grounded: false,
            standingOn: null,
            lastPlatform: null,
            coyoteFrames: 0
        };

        let platforms = [];
        let score = 0;
        let gameActive = true;
        let keys = { left: false, right: false };
        let animFrame = 0;

        function createPlatform(y, type = 'normal', fixedX = null) {
            const x = (fixedX !== null) ? fixedX : Math.random() * (canvas.width - PLATFORM_WIDTH);
            if (fixedX === null && Math.random() > 0.85 && score > 150) type = 'spike';
            return { x, y, width: PLATFORM_WIDTH, height: PLATFORM_HEIGHT, type };
        }

        // 初期配置
        platforms.push(createPlatform(player.y + 100, 'normal', 160));
        for (let i = 1; i < 6; i++) {
            platforms.push(createPlatform(player.y + 100 + (i * 100)));
        }

        // 入力処理（左右）
        const handleInput = (key, state) => { keys[key] = state; };
        
        window.addEventListener('keydown', e => {
            if (e.code === 'ArrowLeft') handleInput('left', true);
            if (e.code === 'ArrowRight') handleInput('right', true);
        });
        window.addEventListener('keyup', e => {
            if (e.code === 'ArrowLeft') handleInput('left', false);
            if (e.code === 'ArrowRight') handleInput('right', false);
        });

        // スマホ操作
        const setupBtn = (btn, key) => {
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(key, true); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); handleInput(key, false); });
            btn.addEventListener('mousedown', () => handleInput(key, true));
            btn.addEventListener('mouseup', () => handleInput(key, false));
            btn.addEventListener('mouseleave', () => handleInput(key, false));
        };
        setupBtn(document.getElementById('leftBtn'), 'left');
        setupBtn(document.getElementById('rightBtn'), 'right');

        function update() {
            if (!gameActive) return;

            scrollSpeed += SPEED_UP_RATE;

            // --- 横移動の処理（慣性を排除） ---
            if (keys.left) {
                player.vx = -WALK_SPEED;
            } else if (keys.right) {
                player.vx = WALK_SPEED;
            } else {
                player.vx = 0; // 離した瞬間に速度を0にする
            }

            // --- 縦移動の処理（落ち始めふんわり、徐々に加速） ---
            if (!player.grounded) {
                const floatRatio = Math.min(player.vy / FLOAT_THRESHOLD, 1);
                const gravity = GRAVITY_MIN + (GRAVITY_MAX - GRAVITY_MIN) * floatRatio;
                player.vy += gravity;
                player.vy *= FALL_AIR_RESISTANCE;
            }

            player.x += player.vx;
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // x更新直後にはみ出し判定（y更新より先）
            if (player.grounded && player.standingOn) {
                const p = player.standingOn;
                const stillOn = player.x + player.width > p.x && player.x < p.x + p.width && p.y > -40;
                if (!stillOn) {
                    player.grounded = false;
                    player.lastPlatform = player.standingOn; // 離れた足場を記録
                    player.standingOn = null;
                    player.vy = 0.1;
                }
            }

            player.y += player.vy;

            // 足場を先にスクロールさせてからy補正
            platforms.forEach(p => { p.y -= scrollSpeed; });

            // 衝突判定：落下中かつクールダウン終了後のみ着地可能
            let onGround = false;
            let standingPlatform = null;
            if (player.coyoteFrames > 0) player.coyoteFrames--;

            if (!player.grounded && player.vy > 0) {
                platforms.forEach(p => {
                    if (p === player.lastPlatform) return; // 離れた足場には着地しない
                    if (player.x + player.width > p.x &&
                        player.x < p.x + p.width &&
                        player.y + player.height >= p.y &&
                        player.y + player.height <= p.y + p.height + player.vy + scrollSpeed) {

                        player.y = p.y - player.height - 6;
                        player.vy = 0;
                        onGround = true;
                        standingPlatform = p;
                        player.lastPlatform = null; // 別の足場に着いたらリセット
                        if (p.type === 'spike') gameOver("トゲに当たった！");
                    }
                });
            } else if (player.grounded && player.standingOn) {
                const p = player.standingOn;
                if (p.y > -40) {
                    player.y = p.y - player.height - 6;
                    onGround = true;
                    standingPlatform = p;
                }
            }

            player.grounded = onGround;
            player.standingOn = standingPlatform;

            if (platforms[platforms.length - 1].y < canvas.height - 80) {
                platforms.push(createPlatform(canvas.height));
                score += 1;
                depthElement.innerText = score;
            }
            if (platforms[0] && platforms[0].y < -40) platforms.shift();

            if (player.y < 20) gameOver("天井に刺さった！");
            if (player.y > canvas.height) gameOver("落ちちゃった！");

            animFrame++;
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景グラデーション（深くなるほど暗くなる演出）
            const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, "#e8f4ff");
            bgGrad.addColorStop(1, "#c8a8e9");
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 背景の泡（スクロールに合わせてゆらゆら）
            ctx.fillStyle = "rgba(255,255,255,0.25)";
            for (let i = 0; i < 8; i++) {
                const bx = (i * 137 + animFrame * 0.3) % canvas.width;
                const by = (i * 83 + animFrame * 0.5) % canvas.height;
                const br = 8 + (i % 3) * 6;
                ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
            }

            // 天井：岩のギザギザ＋グラデーション
            const ceilGrad = ctx.createLinearGradient(0, 0, 0, 35);
            ceilGrad.addColorStop(0, "#5a4a6a");
            ceilGrad.addColorStop(1, "#8a6a9a");
            ctx.fillStyle = ceilGrad;
            ctx.fillRect(0, 0, canvas.width, 10);
            ctx.fillStyle = ceilGrad;
            for (let i = 0; i < canvas.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, 10);
                ctx.lineTo(i + 10, 32);
                ctx.lineTo(i + 20, 10);
                ctx.fill();
            }
            // 天井のハイライト
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            for (let i = 0; i < canvas.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i + 2, 10);
                ctx.lineTo(i + 8, 26);
                ctx.lineTo(i + 14, 10);
                ctx.fill();
            }

            // 足場
            platforms.forEach(p => {
                if (p.type === 'normal') {
                    // 草ブロック風：土の層＋草の層＋光沢
                    const dirtGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.height);
                    dirtGrad.addColorStop(0, "#7ec8a0");
                    dirtGrad.addColorStop(0.4, "#5aaa7a");
                    dirtGrad.addColorStop(0.41, "#c8955a");
                    dirtGrad.addColorStop(1, "#a07040");
                    ctx.fillStyle = dirtGrad;
                    ctx.beginPath();
                    ctx.roundRect(p.x, p.y, p.width, p.height, 4);
                    ctx.fill();

                    // 草のブツブツ
                    ctx.fillStyle = "#4a9a60";
                    for (let gx = p.x + 6; gx < p.x + p.width - 4; gx += 8) {
                        ctx.beginPath();
                        ctx.arc(gx, p.y + 3, 3, Math.PI, 0);
                        ctx.fill();
                    }
                    // 光沢
                    ctx.fillStyle = "rgba(255,255,255,0.2)";
                    ctx.beginPath();
                    ctx.roundRect(p.x + 3, p.y + 1, p.width - 6, 4, 2);
                    ctx.fill();

                } else {
                    // トゲ足場：黒い岩＋赤トゲ
                    const rockGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.height);
                    rockGrad.addColorStop(0, "#444");
                    rockGrad.addColorStop(1, "#222");
                    ctx.fillStyle = rockGrad;
                    ctx.beginPath();
                    ctx.roundRect(p.x, p.y, p.width, p.height, 3);
                    ctx.fill();

                    // トゲ（グラデーション）
                    for (let x = p.x + 2; x < p.x + p.width - 2; x += 10) {
                        const spikeGrad = ctx.createLinearGradient(x, p.y - 10, x + 5, p.y);
                        spikeGrad.addColorStop(0, "#ff4444");
                        spikeGrad.addColorStop(1, "#aa0000");
                        ctx.fillStyle = spikeGrad;
                        ctx.beginPath();
                        ctx.moveTo(x, p.y);
                        ctx.lineTo(x + 5, p.y - 11);
                        ctx.lineTo(x + 10, p.y);
                        ctx.fill();
                    }
                    // トゲの光沢
                    ctx.fillStyle = "rgba(255,180,180,0.3)";
                    for (let x = p.x + 2; x < p.x + p.width - 2; x += 10) {
                        ctx.beginPath();
                        ctx.moveTo(x + 1, p.y - 1);
                        ctx.lineTo(x + 4, p.y - 9);
                        ctx.lineTo(x + 5, p.y - 1);
                        ctx.fill();
                    }
                }
            });

            // カービィ描画
            const cx = player.x + 15;
            const cy = player.y + 15;
            const isRunning = (keys.left || keys.right) && player.grounded;
            const isFalling = !player.grounded && player.vy > 0.3;
            const runCycle = Math.sin(animFrame * 0.35); // 走りサイクル
            const bataRapid = Math.sin(animFrame * 0.6); // バタバタ（速め）

            // 手足を楕円で描くヘルパー（中心x,y・回転角・幅・高さ）
            const drawLimb = (lx, ly, angle, rw, rh, color) => {
                ctx.save();
                ctx.translate(lx, ly);
                ctx.rotate(angle);
                ctx.fillStyle = color;
                ctx.strokeStyle = "#d4609a";
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.ellipse(0, 0, rw, rh, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            };

            if (isFalling) {
                // 落下中：手足バタバタ（楕円が大きく上下に振れる）
                drawLimb(cx - 18, cy - 2 + bataRapid * 8,  -0.5 + bataRapid * 0.4, 7, 4, "#ffcce0");
                drawLimb(cx + 18, cy - 2 - bataRapid * 8,   0.5 - bataRapid * 0.4, 7, 4, "#ffcce0");
                drawLimb(cx - 10, cy + 16 + bataRapid * 6,  bataRapid * 0.5,        9, 4, "#ff6b6b");
                drawLimb(cx + 10, cy + 16 - bataRapid * 6, -bataRapid * 0.5,        9, 4, "#ff6b6b");
            } else if (isRunning) {
                // 走り中：手足が交互に前後スイング
                const dir = keys.left ? -1 : 1;
                drawLimb(cx - 18 + runCycle * 5 * dir, cy + 2 - Math.abs(runCycle) * 3,  runCycle * 0.4 * dir, 7, 4, "#ffcce0");
                drawLimb(cx + 18 - runCycle * 5 * dir, cy + 2 - Math.abs(runCycle) * 3, -runCycle * 0.4 * dir, 7, 4, "#ffcce0");
                drawLimb(cx - 9  - runCycle * 7,       cy + 17,  runCycle * 0.5,  9, 4, "#ff6b6b");
                drawLimb(cx + 9  + runCycle * 7,       cy + 17, -runCycle * 0.5,  9, 4, "#ff6b6b");
            } else {
                // 待機：ぷらぷら
                const idle = Math.sin(animFrame * 0.08) * 2;
                drawLimb(cx - 18, cy + 3 + idle,  0.2, 7, 4, "#ffcce0");
                drawLimb(cx + 18, cy + 3 - idle, -0.2, 7, 4, "#ffcce0");
                drawLimb(cx - 9,  cy + 17,        0.1, 9, 4, "#ff6b6b");
                drawLimb(cx + 9,  cy + 17,       -0.1, 9, 4, "#ff6b6b");
            }

            // 胴体（丸）
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(cx, cy, 15, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#d4609a"; ctx.lineWidth = 1.5;
            ctx.stroke();

            // 表情
            ctx.fillStyle = "#000";
            if (isFalling) {
                // バタバタ顔（丸目＋口あけ）
                ctx.beginPath(); ctx.arc(cx - 5, cy - 3, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + 5, cy - 3, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx, cy + 4, 3, 0, Math.PI); ctx.fill(); // 口
            } else if (isRunning) {
                // 走り顔（横長目）
                ctx.fillRect(cx - 7, cy - 5, 5, 3);
                ctx.fillRect(cx + 2, cy - 5, 5, 3);
                ctx.beginPath(); ctx.arc(cx + (keys.right ? 2 : -2), cy + 4, 2, 0, Math.PI); ctx.fill();
            } else {
                // 通常顔
                ctx.fillRect(cx - 6, cy - 5, 3, 7); ctx.fillRect(cx + 3, cy - 5, 3, 7);
            }

            // ほっぺ
            ctx.fillStyle = "#ff85a1";
            ctx.beginPath(); ctx.arc(cx - 10, cy + 3, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 10, cy + 3, 4, 0, Math.PI * 2); ctx.fill();
        }

        function gameOver(msg) {
            gameActive = false;

            // ランキング保存（localStorage）
            const key = 'kirbydown_ranking';
            let ranking = JSON.parse(localStorage.getItem(key) || '[]');
            ranking.push(score);
            ranking.sort((a, b) => b - a);
            ranking = ranking.slice(0, 5);
            localStorage.setItem(key, JSON.stringify(ranking));

            // 画面表示
            document.getElementById('goScore').textContent = score;
            const list = document.getElementById('rankingList');
            list.innerHTML = '';
            const medals = ['🥇', '🥈', '🥉', '4', '5'];
            ranking.forEach((s, i) => {
                const li = document.createElement('li');
                li.className = `rank-${i + 1}${s === score && ranking.indexOf(score) === i ? ' current' : ''}`;
                li.innerHTML = `<span class="rank-num">${medals[i]}</span><span class="rank-score">${s} m</span>`;
                list.appendChild(li);
            });
            document.getElementById('gameOverScreen').classList.add('show');
        }

        update();
    </script>
</body>
</html>
